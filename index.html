<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JIN Planner</title>
  <style>
    :root {
      --bg:        #eceef7;
      --card:      #fff;
      --purple:    #7B5CFF;
      --purple-dk: #5A3FE0;
      --purple-lt: #EEE8FF;
      --purple-md: #a78bfa;
      --pink:      #FF4F7B;
      --pink-lt:   #FFE8EF;
      --text:      #2D2D5B;
      --muted:     #9898B8;
      --border:    #eceef7;
      --sh:        0 4px 24px rgba(100,100,180,.10);
      --sh-lg:     0 8px 36px rgba(100,100,180,.18);
      --r:         20px;
      --r-sm:      12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; overflow: hidden; }
    button { font-family: inherit; cursor: pointer; }

    /* ── Sidebar ── */
    .sidebar {
      width: 68px; background: var(--card); flex-shrink: 0; z-index: 20;
      display: flex; flex-direction: column; align-items: center; padding: 18px 0;
      border-radius: 0 28px 28px 0; box-shadow: 4px 0 24px rgba(100,100,180,.08);
    }
    .sb-logo {
      width: 42px; height: 42px; border-radius: 14px; margin-bottom: 18px; font-size: 20px;
      background: linear-gradient(135deg, var(--purple), var(--purple-md));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(123,92,255,.35);
    }
    .sb-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; width: 100%; align-items: center; }
    .sb-sep { width: 28px; height: 1.5px; background: var(--border); margin: 8px 0; border-radius: 2px; }
    .sb-btn {
      width: 46px; height: 46px; border-radius: 14px; border: none; background: none;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); transition: all .14s; position: relative;
    }
    .sb-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
    .sb-btn:hover { background: var(--purple-lt); color: var(--purple); }
    .sb-btn.on  { background: var(--purple); color: #fff; box-shadow: 0 4px 14px rgba(123,92,255,.38); }
    .sb-tooltip {
      position: absolute; left: 58px; background: var(--text); color: #e8e8ff;
      font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 8px;
      white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity .15s;
      box-shadow: 0 2px 10px rgba(0,0,0,.18); z-index: 10;
    }
    .sb-btn:hover .sb-tooltip { opacity: 1; }

    /* ── Content ── */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── Topbar ── */
    .topbar { padding: 20px 24px 10px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .tb-title { font-size: 22px; font-weight: 900; letter-spacing: -.5px; flex: 1; }
    .tb-title span { color: var(--purple); }
    .search-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--card); border-radius: 30px; padding: 9px 16px; box-shadow: var(--sh);
    }
    .search-pill input { border: none; outline: none; font-size: 13px; color: var(--text); background: none; width: 160px; font-family: inherit; }
    .search-pill input::placeholder { color: var(--muted); }

    .btn-sort {
      background: var(--card); color: var(--text); border: none; border-radius: 30px;
      padding: 9px 16px; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 7px;
      box-shadow: var(--sh); transition: all .14s; white-space: nowrap; flex-shrink: 0;
    }
    .btn-sort:hover { background: var(--purple-lt); color: var(--purple); transform: translateY(-1px); }
    .sort-icon { display: flex; flex-direction: column; gap: 2.5px; width: 13px; flex-shrink: 0; }
    .sort-icon span { display: block; height: 1.8px; border-radius: 2px; background: currentColor; transition: width .2s; }
    .sort-icon span:nth-child(1) { width: 100%; }
    .sort-icon span:nth-child(2) { width: 68%; }
    .sort-icon span:nth-child(3) { width: 36%; }
    .btn-sort.asc .sort-icon span:nth-child(1) { width: 36%; }
    .btn-sort.asc .sort-icon span:nth-child(2) { width: 68%; }
    .btn-sort.asc .sort-icon span:nth-child(3) { width: 100%; }

    .btn-refresh {
      width: 38px; height: 38px; border-radius: 12px; border: none;
      background: var(--card); color: var(--muted); box-shadow: var(--sh);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .14s;
    }
    .btn-refresh svg { width: 17px; height: 17px; }
    .btn-refresh:hover { background: var(--purple-lt); color: var(--purple); }
    .btn-refresh.spinning svg { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Filter Bar ── */
    .filter-bar { padding: 0 24px 14px; display: flex; gap: 7px; flex-wrap: wrap; align-items: center; flex-shrink: 0; }
    .fpill {
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1.5px solid #dde0f0; background: var(--card); color: var(--muted); transition: all .12s;
    }
    .fpill:hover { border-color: var(--purple); color: var(--purple); }
    .fpill.on { background: var(--purple); color: #fff; border-color: var(--purple); box-shadow: 0 3px 10px rgba(123,92,255,.3); }
    .count-badge { margin-left: auto; background: var(--purple-lt); color: var(--purple); font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; }

    /* ── Main ── */
    .main { display: flex; flex: 1; overflow: hidden; }
    .grid-wrap { flex: 1; overflow-y: auto; padding: 4px 24px 60px; -webkit-overflow-scrolling: touch; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 16px; align-content: start; }

    /* ── State views ── */
    .state-view {
      grid-column: 1/-1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: calc(100dvh - 200px); gap: 14px; text-align: center; padding: 40px 20px;
    }
    .state-icon { font-size: 52px; margin-bottom: 4px; }
    .state-title { font-size: 17px; font-weight: 800; }
    .state-desc { font-size: 13px; color: var(--muted); line-height: 1.75; }
    .state-desc code { background: #f0f1f8; padding: 2px 8px; border-radius: 6px; font-size: 11.5px; color: var(--purple); font-family: 'Consolas', monospace; }
    .state-btn {
      background: var(--purple); color: #fff; border: none; border-radius: 30px;
      padding: 12px 28px; font-size: 14px; font-weight: 700; margin-top: 6px;
      box-shadow: 0 6px 20px rgba(123,92,255,.40); transition: all .14s;
    }
    .state-btn:hover { background: var(--purple-dk); transform: translateY(-2px); }

    /* ── Card ── */
    .card { background: var(--card); border-radius: var(--r); box-shadow: var(--sh); overflow: hidden; transition: box-shadow .15s, transform .15s; }
    .card:hover { box-shadow: var(--sh-lg); transform: translateY(-4px); }
    .card-bar { height: 5px; background: linear-gradient(90deg, var(--purple), var(--purple-md)); }
    .card-body { padding: 16px 16px 13px; }
    .card-top { margin-bottom: 10px; }
    .card-name { font-size: 15px; font-weight: 800; line-height: 1.35; }

    /* Pages */
    .pages { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .pg-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 11px; border-radius: var(--r-sm);
      background: #f6f7fc; font-size: 12px; font-weight: 600; color: #5a5a80;
      transition: all .12s; cursor: pointer;
    }
    .pg-item:hover { background: var(--purple-lt); color: var(--purple); }
    .pg-item.active { background: linear-gradient(135deg, var(--purple), #9B7BFF); color: #fff; box-shadow: 0 4px 14px rgba(123,92,255,.32); }
    .pg-icon { font-size: 11px; opacity: .5; flex-shrink: 0; }
    .pg-item.active .pg-icon { opacity: .85; }
    .pg-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pg-newtab {
      font-size: 11px; opacity: 0; pointer-events: none;
      background: none; border: none; color: inherit; padding: 0; line-height: 1;
      transition: opacity .1s; cursor: pointer; flex-shrink: 0;
    }
    .pg-item:hover .pg-newtab, .pg-item.active .pg-newtab { opacity: .65; pointer-events: auto; }
    .pg-empty { font-size: 12px; color: var(--muted); padding: 2px 0; }

    /* Card foot */
    .card-foot { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; border-top: 1.5px solid #f0f1f8; margin-top: 2px; gap: 8px; }
    .card-foot-date { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; color: var(--muted); }
    .card-foot-date svg { width: 11px; height: 11px; flex-shrink: 0; opacity: .55; }
    .card-foot-date .arr { opacity: .35; font-size: 10px; }
    .status-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; line-height: 1; flex-shrink: 0; }
    .s-wait { background: #f0f1f8; color: #888; }
    .s-wip  { background: #FFF3E0; color: #E65100; }
    .s-done { background: #E8F5E9; color: #2E7D32; }

    /* empty grid */
    .grid-empty { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 10px; text-align: center; }
    .grid-empty p { font-size: 14px; color: var(--muted); font-weight: 600; }
    .grid-empty small { font-size: 12px; color: #c0c0d8; }

    /* ── Preview Panel ── */
    .preview-panel {
      width: 0; overflow: hidden; background: var(--card); flex-shrink: 0;
      display: flex; flex-direction: column; transition: width .22s cubic-bezier(.4,0,.2,1);
      border-radius: 24px 0 0 24px; box-shadow: -4px 0 28px rgba(100,100,180,.10);
    }
    .preview-panel.open { width: 56%; }
    .prev-head { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1.5px solid #f0f1f8; flex-shrink: 0; }
    .ph-info { flex: 1; min-width: 0; }
    .ph-name { font-size: 14px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ph-proj { font-size: 11px; color: var(--muted); }
    .ph-newtab { background: var(--purple-lt); color: var(--purple); border: none; border-radius: 20px; padding: 7px 15px; font-size: 12px; font-weight: 700; white-space: nowrap; transition: all .14s; }
    .ph-newtab:hover { background: var(--purple); color: #fff; }
    .ph-close { width: 34px; height: 34px; border-radius: 10px; background: #f5f5fa; border: none; font-size: 14px; color: var(--muted); display: flex; align-items: center; justify-content: center; transition: all .14s; }
    .ph-close:hover { background: var(--pink-lt); color: var(--pink); }
    .preview-panel iframe { flex: 1; border: none; width: 100%; }

    /* ── Help Panel ── */
    .help-panel {
      display: none; position: fixed; bottom: 20px; left: 88px; z-index: 300;
      background: var(--text); color: #e0e0ff; border-radius: 22px; padding: 22px 24px;
      width: 320px; font-size: 13px; line-height: 1.75; box-shadow: 0 16px 50px rgba(45,45,91,.28);
    }
    .help-panel.open { display: block; }
    .help-panel h3 { font-size: 13px; font-weight: 800; color: var(--purple-md); margin-bottom: 10px; }
    .help-panel li { margin-left: 15px; margin-bottom: 5px; }
    .help-panel strong { color: #fff; }
    .help-panel code { background: rgba(255,255,255,.1); padding: 2px 7px; border-radius: 5px; font-size: 11px; color: #c7d2fe; }
    .hclose { position: absolute; top: 14px; right: 16px; background: none; border: none; color: #666; font-size: 16px; cursor: pointer; }
    .hclose:hover { color: #ccc; }
    .help-ex { margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.08); }
    .help-ex-title { font-size: 11px; color: #888; font-weight: 600; margin-bottom: 6px; }
    .help-ex code { font-size: 10.5px; display: block; background: rgba(255,255,255,.06); padding: 10px 13px; border-radius: 10px; line-height: 2.1; color: #c7d2fe; }

    /* ── Toast ── */
    .toast { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; border-radius: 14px; padding: 12px 22px; font-size: 13px; font-weight: 500; z-index: 400; box-shadow: 0 8px 32px rgba(45,45,91,.22); white-space: nowrap; }
    .toast.show { display: block; }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .sidebar { display: none; }
      .topbar { padding: 14px 16px 10px; gap: 8px; }
      .tb-title { font-size: 17px; }
      .filter-bar { padding: 0 16px 10px; }
      .grid-wrap { padding: 4px 14px 60px; }
      .grid { grid-template-columns: 1fr; gap: 12px; }
      .search-pill { flex: 1; }
      .search-pill input { width: 100%; }
      .preview-panel { position: fixed; inset: 0; width: 100% !important; z-index: 150; transform: translateY(100%); border-radius: 24px 24px 0 0; transition: transform .25s cubic-bezier(.4,0,.2,1), width 0s; }
      .preview-panel.open { width: 100% !important; transform: translateY(0); }
    }
    @media (min-width: 681px) and (max-width: 1024px) {
      .preview-panel.open { width: 50%; }
    }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<nav class="sidebar">
  <div class="sb-logo">📋</div>
  <div class="sb-nav">
    <button class="sb-btn on" data-nav="all">
      <svg viewBox="0 0 20 20" fill="currentColor"><rect x="2" y="2" width="7" height="7" rx="2"/><rect x="11" y="2" width="7" height="7" rx="2"/><rect x="2" y="11" width="7" height="7" rx="2"/><rect x="11" y="11" width="7" height="7" rx="2"/></svg>
      <span class="sb-tooltip">전체</span>
    </button>
    <button class="sb-btn" data-nav="대기중">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="7"/></svg>
      <span class="sb-tooltip">대기중</span>
    </button>
    <button class="sb-btn" data-nav="진행중">
      <svg viewBox="0 0 20 20"><path fill="currentColor" d="M10 3a7 7 0 0 1 0 14z"/><circle cx="10" cy="10" r="7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      <span class="sb-tooltip">진행중</span>
    </button>
    <button class="sb-btn" data-nav="완료">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><polyline points="7,10.5 9,13 13,7.5"/></svg>
      <span class="sb-tooltip">완료</span>
    </button>
  </div>
  <div class="sb-sep"></div>
  <button class="sb-btn" onclick="toggleHelp()">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="10" cy="10" r="7"/><path d="M7.8 8a2.3 2.3 0 0 1 4.5.7c0 1.5-2.3 2-2.3 3.3"/><circle cx="10" cy="14.5" r=".7" fill="currentColor" stroke="none"/></svg>
    <span class="sb-tooltip">도움말</span>
  </button>
</nav>

<!-- ── Content ── -->
<div class="content">
  <div class="topbar">
    <div class="tb-title"><span>JIN</span> Planner</div>
    <div class="search-pill">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="#9898B8" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="9" r="6"/><line x1="14" y1="14" x2="18" y2="18"/></svg>
      <input type="text" id="search" placeholder="프로젝트 검색..." oninput="render()">
    </div>
    <button class="btn-sort" id="sortBtn" onclick="toggleSort()" style="display:none">
      <div class="sort-icon"><span></span><span></span><span></span></div>
      <span id="sortLabel">최신순</span>
    </button>
    <button class="btn-refresh" id="refreshBtn" onclick="rescan()" title="새로고침" style="display:none">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 10a7 7 0 1 1-1.5-4.3"/><polyline points="17,3 17,7 13,7"/>
      </svg>
    </button>
  </div>

  <div class="filter-bar" id="filterBar" style="display:none"></div>

  <div class="main">
    <div class="grid-wrap">
      <div class="grid" id="grid"></div>
    </div>
    <div class="preview-panel" id="previewPanel">
      <div class="prev-head">
        <div class="ph-info">
          <div class="ph-name" id="phName"></div>
          <div class="ph-proj" id="phProj"></div>
        </div>
        <button class="ph-newtab" onclick="openInTab()">↗ 새 탭</button>
        <button class="ph-close" onclick="closePreview()">✕</button>
      </div>
      <iframe id="previewFrame" src="about:blank" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals"></iframe>
    </div>
  </div>
</div>

<!-- ── Help Panel ── -->
<div class="help-panel" id="helpPanel">
  <button class="hclose" onclick="toggleHelp()">✕</button>
  <h3>📁 폴더명 규칙</h3>
  <ul>
    <li><code>[시작~완료]</code> → <strong>완료</strong></li>
    <li><code>[시작]</code> → <strong>진행중</strong></li>
    <li>날짜 없음 → <strong>대기중</strong></li>
  </ul>
  <div class="help-ex">
    <div class="help-ex-title">폴더명 예시</div>
    <code>[260501~260520] 앱 리뉴얼<br>[260415] 웹사이트 기획<br>랜딩페이지</code>
  </div>
  <div class="help-ex">
    <div class="help-ex-title">페이지 순서 (파일명 기준)</div>
    <code>01_메인기획.html<br>02_상세기획.html</code>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ────────────────────────────────────────────
  // 설정 — Private 저장소인 경우만 token 입력
  // owner / repo 는 GitHub Pages URL에서 자동 감지
  // ────────────────────────────────────────────
  const CONFIG = {
    branch: 'main',
    token:  '',
  };

  // ── 상수 ──
  const SKIP_DIRS  = new Set(['.git', 'node_modules', '.github', '.vscode', '.idea']);
  const STATUS_MAP = { '완료':['s-done','◉ 완료'], '진행중':['s-wip','◑ 진행중'], '대기중':['s-wait','◯ 대기중'] };
  const CAL_SVG    = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="3" width="12" height="11" rx="2"/><line x1="5" y1="1" x2="5" y2="5"/><line x1="11" y1="1" x2="11" y2="5"/><line x1="2" y1="7" x2="14" y2="7"/></svg>`;

  // ── GitHub 정보 자동 감지 ──
  function detectGitHub() {
    const m = location.hostname.match(/^(.+)\.github\.io$/i);
    if (!m) return null;
    const owner = m[1];
    const parts = location.pathname.replace(/\/+$/, '').split('/').filter(Boolean);
    const repo  = parts.length ? parts[0] : `${owner}.github.io`;
    return { owner, repo, branch: CONFIG.branch, token: CONFIG.token };
  }

  // ── GitHub Contents API ──
  async function ghFetch(path, gi) {
    const url = `https://api.github.com/repos/${gi.owner}/${gi.repo}/contents/${path}?ref=${gi.branch}`;
    const headers = { Accept: 'application/vnd.github+json' };
    if (gi.token) headers.Authorization = `Bearer ${gi.token}`;
    const res = await fetch(url, { headers });
    if (res.status === 403 || res.status === 429) throw Object.assign(new Error('rate_limit'), { status: res.status });
    if (res.status === 404) throw Object.assign(new Error('not_found'), { status: 404 });
    if (!res.ok) throw new Error(`api_${res.status}`);
    return res.json();
  }

  async function fetchTitle(downloadUrl, fallback, gi) {
    try {
      const headers = gi.token ? { Authorization: `Bearer ${gi.token}` } : {};
      const res  = await fetch(downloadUrl, { headers });
      const text = await res.text();
      const m    = text.match(/<title[^>]*>([^<]+)<\/title>/i);
      if (m && m[1].trim()) return m[1].trim();
    } catch {}
    return fallback.replace(/\.html$/i, '');
  }

  // ── 폴더명 파싱 ──
  function fmtDate(yymmdd) {
    return `${yymmdd.slice(0,2)}.${yymmdd.slice(2,4)}.${yymmdd.slice(4,6)}`;
  }
  function parseFolderName(name) {
    const m = name.match(/^\[(\d{6})(?:~(\d{6}))?\]\s*(.+)$/);
    if (m) return { displayName: m[3].trim(), startRaw: m[1], endRaw: m[2] || null };
    return { displayName: name, startRaw: null, endRaw: null };
  }
  function getStatus(p) {
    if (p.startRaw && p.endRaw) return '완료';
    if (p.startRaw) return '진행중';
    return '대기중';
  }
  function getYear(p) { return p.startRaw ? '20' + p.startRaw.slice(0, 2) : null; }

  // ── 페이지 URL 생성 (GitHub Pages 기준 상대경로) ──
  function pageUrl(folderName, fileName) {
    // location.pathname 기준으로 상대경로 구성
    const base = location.pathname.replace(/\/[^/]*$/, '/');
    return base + encodeURIComponent(folderName) + '/' + encodeURIComponent(fileName);
  }

  // ── 앱 상태 ──
  let GI       = null;
  let PROJECTS = [];
  let STATE    = 'init';
  let activeNav  = 'all';
  let activeYear = 'all';
  let sortDesc   = true;
  let activeFile = null;
  let _pmap      = {};

  // ── 초기화 ──
  async function init() {
    GI = detectGitHub();
    if (!GI) { setState('not_github'); return; }
    await scan();
  }

  function setState(s) {
    STATE = s;
    const ready = s === 'ready';
    document.getElementById('filterBar').style.display   = ready ? '' : 'none';
    document.getElementById('sortBtn').style.display     = ready ? '' : 'none';
    document.getElementById('refreshBtn').style.display  = (ready || s === 'scanning') ? '' : 'none';
    document.getElementById('refreshBtn').classList.toggle('spinning', s === 'scanning');
    if (!ready) renderStateView();
  }

  // ── 스캔 ──
  async function scan(force = false) {
    setState('scanning');

    // 세션 캐시
    if (!force) {
      const cached = tryCache('get');
      if (cached) { PROJECTS = cached; setState('ready'); render(); return; }
    }

    try {
      const rootItems = await ghFetch('', GI);
      const dirs = rootItems.filter(e => e.type === 'dir' && !e.name.startsWith('.') && !SKIP_DIRS.has(e.name));
      PROJECTS = (await Promise.all(dirs.map(d => scanProject(d.name)))).filter(Boolean);
      tryCache('set', PROJECTS);
      setState('ready');
      render();
    } catch (e) {
      if (e.message === 'rate_limit') {
        toast('GitHub API 요청 한도 초과. 잠시 후 다시 시도해주세요.', 7000);
      } else if (e.message === 'not_found') {
        toast('저장소를 찾을 수 없습니다. 공개(Public) 저장소인지 확인해주세요.', 7000);
      } else {
        toast('목록을 불러오지 못했습니다. 네트워크를 확인해주세요.');
      }
      setState('error');
    }
  }

  async function rescan() { tryCache('clear'); await scan(true); }

  async function scanProject(folderName) {
    try {
      const items    = await ghFetch(encodeURIComponent(folderName), GI);
      const htmlList = items
        .filter(f => f.type === 'file' && f.name.toLowerCase().endsWith('.html'))
        .sort((a, b) => a.name.localeCompare(b.name, 'ko'));

      const pages = await Promise.all(htmlList.map(async f => ({
        label: await fetchTitle(f.download_url, f.name, GI),
        file:  pageUrl(folderName, f.name),
      })));

      const parsed = parseFolderName(folderName);
      return { id: folderName, pages, ...parsed, status: getStatus(parsed), year: getYear(parsed) };
    } catch { return null; }
  }

  // ── 세션 캐시 ──
  function tryCache(op, data) {
    const key = `jplanner-${GI?.owner}-${GI?.repo}`;
    try {
      if (op === 'get') { const r = sessionStorage.getItem(key); return r ? JSON.parse(r) : null; }
      if (op === 'set') { sessionStorage.setItem(key, JSON.stringify(data)); }
      if (op === 'clear') { sessionStorage.removeItem(key); }
    } catch {}
  }

  // ── State View 렌더 ──
  function renderStateView() {
    const views = {
      scanning: `<div class="state-view"><div class="state-icon">⏳</div><div class="state-title">프로젝트를 불러오는 중...</div></div>`,
      error:    `<div class="state-view">
        <div class="state-icon">⚠️</div>
        <div class="state-title">불러오기에 실패했습니다</div>
        <div class="state-desc">저장소가 Public인지, 네트워크 상태를 확인해주세요</div>
        <button class="state-btn" onclick="rescan()">다시 시도</button>
      </div>`,
      not_github: `<div class="state-view">
        <div class="state-icon">🔗</div>
        <div class="state-title">GitHub Pages에서 실행해주세요</div>
        <div class="state-desc">
          이 파일은 GitHub Pages 환경에서 동작합니다.<br>
          <code>username.github.io/repo-name/</code> 형식의 URL로 접근해주세요.
        </div>
      </div>`,
    };
    document.getElementById('grid').innerHTML = views[STATE] || '';
  }

  // ── 렌더 ──
  function render() {
    if (STATE !== 'ready') return;
    const q = (document.getElementById('search').value || '').toLowerCase();

    let projects = [...PROJECTS];
    if (activeNav !== 'all') projects = projects.filter(p => p.status === activeNav);
    if (activeYear !== 'all') projects = projects.filter(p => p.year === activeYear);
    if (q) projects = projects.filter(p => (p.displayName || '').toLowerCase().includes(q));

    projects.sort((a, b) => {
      const ad = a.startRaw, bd = b.startRaw;
      if (!ad && !bd) return (a.displayName || '').localeCompare(b.displayName || '', 'ko');
      if (!ad) return 1; if (!bd) return -1;
      return sortDesc ? bd.localeCompare(ad) : ad.localeCompare(bd);
    });

    // 연도 알약
    const allYears = [...new Set(PROJECTS.map(p => p.year).filter(Boolean))].sort().reverse();
    document.getElementById('filterBar').innerHTML =
      `<button class="fpill${activeYear === 'all' ? ' on' : ''}" data-year="all">전체</button>` +
      allYears.map(y => `<button class="fpill${activeYear === y ? ' on' : ''}" data-year="${y}">${y}</button>`).join('') +
      `<span class="count-badge">${projects.length}개</span>`;

    _pmap = {};
    const grid = document.getElementById('grid');
    if (!projects.length) {
      grid.innerHTML = PROJECTS.length
        ? `<div class="grid-empty"><p>해당하는 프로젝트가 없습니다</p><small>조건을 바꿔보세요</small></div>`
        : `<div class="grid-empty"><p style="font-size:40px;margin-bottom:8px">📂</p><p>프로젝트 폴더가 없습니다</p><small>저장소 루트에 하위 폴더를 추가해주세요</small></div>`;
      return;
    }
    grid.innerHTML = projects.map(cardHTML).join('');
  }

  function cardHTML(p) {
    const [sCls, sLabel] = STATUS_MAP[p.status];

    let dateHtml = '';
    if (p.startRaw && p.endRaw) {
      dateHtml = `<div class="card-foot-date">${CAL_SVG}${esc(fmtDate(p.startRaw))}<span class="arr">→</span>${esc(fmtDate(p.endRaw))}</div>`;
    } else if (p.startRaw) {
      dateHtml = `<div class="card-foot-date">${CAL_SVG}${esc(fmtDate(p.startRaw))}<span class="arr">→</span></div>`;
    }

    (p.pages || []).forEach((pg, i) => { _pmap[p.id + '_' + i] = { label: pg.label, proj: p.displayName, file: pg.file }; });

    const pagesH = (p.pages || []).length
      ? (p.pages).map((pg, i) => `
          <div class="pg-item${activeFile === pg.file ? ' active' : ''}" data-key="${esc(p.id + '_' + i)}">
            <span class="pg-icon">📄</span>
            <span class="pg-label">${esc(pg.label)}</span>
            <button class="pg-newtab" data-file="${esc(pg.file)}">↗</button>
          </div>`).join('')
      : `<div class="pg-empty">HTML 파일 없음</div>`;

    return `<div class="card">
      <div class="card-bar"></div>
      <div class="card-body">
        <div class="card-top"><div class="card-name">${esc(p.displayName)}</div></div>
        <div class="pages">${pagesH}</div>
        <div class="card-foot">${dateHtml}<span class="status-pill ${sCls}">${sLabel}</span></div>
      </div>
    </div>`;
  }

  const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  // ── 이벤트 ──
  document.getElementById('grid').addEventListener('click', e => {
    const newtab = e.target.closest('.pg-newtab');
    if (newtab) { e.stopPropagation(); window.open(newtab.dataset.file, '_blank'); return; }
    const item = e.target.closest('.pg-item');
    if (item) { openPreview(item.dataset.key); return; }
  });

  document.getElementById('filterBar').addEventListener('click', e => {
    const b = e.target.closest('[data-year]');
    if (!b) return;
    activeYear = b.dataset.year;
    render();
  });

  document.querySelector('.sb-nav').addEventListener('click', e => {
    const btn = e.target.closest('[data-nav]');
    if (!btn) return;
    activeNav = btn.dataset.nav;
    document.querySelectorAll('.sb-btn[data-nav]').forEach(b => b.classList.toggle('on', b.dataset.nav === activeNav));
    render();
  });

  function toggleSort() {
    sortDesc = !sortDesc;
    document.getElementById('sortLabel').textContent = sortDesc ? '최신순' : '오래된순';
    document.getElementById('sortBtn').classList.toggle('asc', !sortDesc);
    render();
  }

  // ── 미리보기 ──
  function openPreview(key) {
    const d = _pmap[key]; if (!d) return;
    activeFile = d.file;
    document.getElementById('phName').textContent = d.label;
    document.getElementById('phProj').textContent = d.proj;
    document.getElementById('previewFrame').src = d.file;
    document.getElementById('previewPanel').classList.add('open');
    render();
  }
  function closePreview() {
    activeFile = null;
    document.getElementById('previewPanel').classList.remove('open');
    document.getElementById('previewFrame').src = 'about:blank';
    render();
  }
  function openInTab() { if (activeFile) window.open(activeFile, '_blank'); }

  function toast(msg, ms = 4000) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), ms);
  }
  function toggleHelp() { document.getElementById('helpPanel').classList.toggle('open'); }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('previewPanel').classList.contains('open')) closePreview();
  });

  init();
</script>
</body>
</html>
